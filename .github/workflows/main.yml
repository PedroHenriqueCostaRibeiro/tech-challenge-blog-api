name: CI

# Quando o robô deve rodar:
on:
  push:
    branches: [ "main" ]        # a cada envio para a branch main
  pull_request:
    branches: [ "main" ]        # e em pull requests para a main

jobs:
  build:
    runs-on: ubuntu-latest      # o robô roda numa máquina Linux limpa

    steps:
      - name: Baixar o codigo do repositorio
        uses: actions/checkout@v4          # traz seu código para a máquina do robô

      - name: Configurar o Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm                       # acelera reaproveitando o cache do npm

      - name: Instalar dependencias
        run: npm ci                        # instalação limpa, baseada no package-lock

      - name: Compilar o TypeScript
        run: npm run build                 # valida que o código compila sem erros

      - name: Rodar os testes (se existirem)
        run: npm test --if-present         # roda os testes; se ainda não houver, ignora

  # Job de deploy: roda DEPOIS do build, apenas em push na branch main.
  deploy:
    name: Deploy no Render
    needs: build                           # só executa se o job "build" passar
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Disparar deploy (Render Deploy Hook)
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}   # secret configurado no GitHub (Parte 5)
        run: |
          if [ -z "$HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK ainda nao configurado; pulando deploy."
            exit 0
          fi
          curl -fsSL -X POST "$HOOK"

